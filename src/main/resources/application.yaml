spring:
  application:
    name: LearnSpring-BinaryTea
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: jdbc:mysql://localhost/binary-tea?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: root
    password: 123456
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
  sql:
    init:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
logging:
  level:
    sql: debug
#      schema-locations: init.sql

binary-tea:
  open-hours: 8:00-24:00
  ready: false




management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: "*"



server:
  shutdown: graceful
  port: 7085
