spring:
  profiles:
    include: jasypt, database,redis
  application:
    name: LearnSpring-BinaryTea
  lifecycle:
    timeout-per-shutdown-phase: 30s
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
  sql:
    init:
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
logging:
  level:
    sql: debug
#      schema-locations: init.sql

binary-tea:
  open-hours: 8:00-24:00
  ready: false




management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: "*"



server:
  shutdown: graceful
  port: 8080
